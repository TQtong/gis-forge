<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoForge MVP — Interactive Map</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #0a0e17;
        color: #e0e6ed;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ─── 顶部栏 ─── */
      header {
        height: 48px;
        padding: 0 20px;
        background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
        border-bottom: 1px solid #21262d;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        z-index: 10;
      }

      header h1 {
        font-size: 18px;
        font-weight: 600;
        background: linear-gradient(90deg, #58a6ff, #3fb950);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      header .badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 12px;
        background: #1f6feb22;
        color: #58a6ff;
        border: 1px solid #1f6feb44;
      }

      header .subtitle {
        font-size: 12px;
        color: #8b949e;
        margin-left: auto;
      }

      /* ─── 主内容区 ─── */
      .main {
        flex: 1;
        display: flex;
        position: relative;
        overflow: hidden;
      }

      /* ─── 地图画布 ─── */
      #map-container {
        flex: 1;
        position: relative;
        cursor: grab;
      }

      #map-container:active {
        cursor: grabbing;
      }

      #map-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* ─── 导航按钮组 ─── */
      #nav-buttons {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        z-index: 5;
      }

      .nav-btn {
        background: rgba(13, 17, 23, 0.85);
        color: #c9d1d9;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 5px 12px;
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.15s ease;
        backdrop-filter: blur(8px);
      }

      .nav-btn:hover {
        background: rgba(31, 111, 235, 0.3);
        border-color: #58a6ff;
        color: #ffffff;
      }

      .nav-btn:active {
        transform: scale(0.96);
      }

      /* ─── 缩放控件 ─── */
      .zoom-controls {
        position: absolute;
        bottom: 24px;
        right: 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        z-index: 5;
      }

      .zoom-btn {
        width: 36px;
        height: 36px;
        background: rgba(13, 17, 23, 0.85);
        color: #c9d1d9;
        border: 1px solid #30363d;
        font-size: 18px;
        font-weight: 300;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        backdrop-filter: blur(8px);
      }

      .zoom-btn:first-child { border-radius: 6px 6px 0 0; }
      .zoom-btn:last-child { border-radius: 0 0 6px 6px; }

      .zoom-btn:hover {
        background: rgba(31, 111, 235, 0.3);
        color: #ffffff;
      }

      /* ─── 调试信息面板 ─── */
      #debug-panel {
        position: absolute;
        bottom: 12px;
        left: 12px;
        background: rgba(13, 17, 23, 0.9);
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 12px;
        font-family: 'Cascadia Code', 'Fira Code', monospace;
        min-width: 240px;
        z-index: 5;
        backdrop-filter: blur(8px);
      }

      #debug-panel h4 {
        font-size: 11px;
        font-weight: 600;
        color: #58a6ff;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }

      .debug-row {
        display: flex;
        justify-content: space-between;
        padding: 2px 0;
        color: #8b949e;
      }

      .debug-row span:last-child {
        color: #c9d1d9;
        font-variant-numeric: tabular-nums;
      }

      /* ─── 归属 ─── */
      .attribution {
        position: absolute;
        bottom: 4px;
        right: 16px;
        font-size: 10px;
        color: #586069;
        z-index: 4;
      }

      .attribution a {
        color: #8b949e;
        text-decoration: none;
      }

      .attribution a:hover {
        text-decoration: underline;
      }

      /* ─── 提示 ─── */
      .hint {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(13, 17, 23, 0.8);
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 11px;
        color: #8b949e;
        z-index: 5;
        backdrop-filter: blur(8px);
        line-height: 1.5;
      }

      .hint kbd {
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 3px;
        padding: 1px 4px;
        font-size: 10px;
        font-family: inherit;
        color: #c9d1d9;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>GeoForge Engine</h1>
      <span class="badge">MVP Prototype</span>
      <span class="subtitle">Camera2D + Raster Tiles | Canvas 2D Renderer</span>
    </header>

    <div class="main">
      <div id="map-container">
        <canvas id="map-canvas"></canvas>

        <!-- 导航按钮 -->
        <div id="nav-buttons"></div>

        <!-- 缩放控件 -->
        <div class="zoom-controls">
          <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
          <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
        </div>

        <!-- 操作提示 -->
        <div class="hint">
          Drag to pan &middot; Scroll to zoom &middot; Double-click to zoom in<br>
          <kbd>+</kbd> / <kbd>−</kbd> to zoom &middot; Click city buttons to fly
        </div>

        <!-- 调试信息 -->
        <div id="debug-panel">
          <h4>Camera State</h4>
          <div id="debug-info">Loading...</div>
        </div>

        <!-- 归属 -->
        <div class="attribution">
          Map data &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors
        </div>
      </div>
    </div>

    <script type="module" src="/src/demo-map.ts"></script>
    <script type="module">
      // 缩放按钮事件（在 Camera2D 初始化后才有效，延迟绑定）
      document.getElementById('zoom-in')?.addEventListener('click', () => {
        document.getElementById('map-canvas')?.dispatchEvent(
          new WheelEvent('wheel', { deltaY: -200, clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 })
        );
      });
      document.getElementById('zoom-out')?.addEventListener('click', () => {
        document.getElementById('map-canvas')?.dispatchEvent(
          new WheelEvent('wheel', { deltaY: 200, clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 })
        );
      });
    </script>
  </body>
</html>
